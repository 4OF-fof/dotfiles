# Status bar colors.
set -g status-style "bg=colour235,fg=colour250"
set -g message-style "bg=colour24,fg=colour255"
set -g mode-style "bg=colour81,fg=colour235"

# Window tab colors.
set -g window-status-style "bg=colour237,fg=colour250"
set -g window-status-current-style "bg=colour220,fg=colour235,bold"
set -g window-status-last-style "bg=colour240,fg=colour255"

# New-tab button and clock colors.
set -g status-format[0] "#[align=left]#[list=on]#{W:#[range=window|#{window_index}]#{E:window-status-format}#[norange],#[list=focus]#[range=window|#{window_index}]#{E:window-status-current-format}#[norange]}#[nolist]#[fg=colour81,bold]#[range=user|new] + #[norange]#[default]#[align=right]#[fg=colour109]#{T:status-right}"
