set -g status-position top
set -g status-interval 30

# ANSI16 palette from Colorschema/ANSI16.json
set -g status-style "bg=#222436,fg=#d6e0fc"
set -g message-style "bg=#8ab0ff,fg=#202030"
set -g mode-style "bg=#ffbb5b,fg=#202030,bold"
set -g pane-border-style "fg=#46466a"
set -g pane-active-border-style "fg=#8ab0ff"

set -g status-justify left
set -g status-left-length 24
set -g status-right-length 16
set -g status-left "#[fg=#8ab0ff,bg=#222436]#[fg=#202030,bg=#8ab0ff,bold] #S #[fg=#8ab0ff,bg=#222436]"
set -g status-right "#[fg=#71dfff,bg=#222436]#[fg=#202030,bg=#71dfff,bold] %H:%M #[fg=#71dfff,bg=#222436]"

set -g window-status-separator ""
set -g window-status-style "bg=#46466a,fg=#a5a5cc"
set -g window-status-current-style "bg=#ffbb5b,fg=#202030,bold"
set -g window-status-last-style "bg=#71dfff,fg=#202030"
set -g window-status-activity-style "bg=#bb91ff,fg=#202030,bold"
set -g window-status-bell-style "bg=#ff5775,fg=#202030,bold"
set -g window-status-format "#[fg=#a5a5cc,bg=#46466a] #I #{?#{n:window_name},#W,win-#I} "
set -g window-status-current-format "#[fg=#202030,bg=#ffbb5b,bold] #I #{?#{n:window_name},#W,win-#I} "
set -g status-format[0] "#{E:status-left} #[list=on]#{W:#[range=window|#{window_index}]#{?window_start_flag,#[fg=#46466a,bg=#222436],}#[fg=#a5a5cc,bg=#46466a] #I #{?#{n:window_name},#W,win-#I} #{?window_end_flag,#[fg=#46466a,bg=#222436],}#[norange],#[list=focus]#[range=window|#{window_index}]#{?window_start_flag,#[fg=#ffbb5b,bg=#222436],#[fg=#46466a,bg=#ffbb5b]}#[fg=#202030,bg=#ffbb5b,bold] #I #{?#{n:window_name},#W,win-#I} #{?window_end_flag,#[fg=#ffbb5b,bg=#222436],#[fg=#ffbb5b,bg=#46466a]}#[norange]}#[nolist]#[align=right]#{E:status-right}"
