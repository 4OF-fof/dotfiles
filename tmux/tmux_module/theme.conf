# Status bar colors.
set -g status-position top
set -g status-style "bg=default,fg=colour250"
set -g message-style "bg=colour24,fg=colour255"
set -g mode-style "bg=colour81,fg=colour235"

# Window tab colors.
set -g window-status-style "bg=colour237,fg=colour250"
set -g window-status-current-style "bg=colour220,fg=colour235,bold"
set -g window-status-last-style "bg=colour240,fg=colour255"
set -g window-status-separator ""
set -g window-status-format " #I #{?#{n:window_name},#W,win-#I} "
set -g window-status-current-format " #I #{?#{n:window_name},#W,win-#I} "

# Session name and clock.
set -g status-left-length 40
set -g status-right-length 40
set -g status-left "#[bg=colour81,fg=colour235,bold] #S #[default]"
set -g status-right "#[fg=colour109]%Y-%m-%d %H:%M "

# Layout: session name / window list / clock.
set -g status-format[0] "#{E:status-left} #[list=on]#{W:#[range=window|#{window_index}]#{E:window-status-format}#[norange],#[list=focus]#[range=window|#{window_index}]#{E:window-status-current-format}#[norange]}#[nolist]#[fg=colour81,bold]#[range=user|new] + #[norange]#[default]#[align=right]#{T:status-right}"
